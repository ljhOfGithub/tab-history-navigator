<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h2>标签页历史导航</h2>
    <div class="toolbar">
      <button class="tool-btn" id="back-btn" title="后退 (Ctrl+Shift+←)">
        <svg viewBox="0 0 24 24">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        后退
      </button>
      <button class="tool-btn" id="forward-btn" title="前进 (Ctrl+Shift+→)">
        <svg viewBox="0 0 24 24">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
        </svg>
        前进
      </button>
      <button class="tool-btn" id="clear-btn" title="清除历史">
        <svg viewBox="0 0 24 24">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
        清除
      </button>
    </div>
  </div>
  
  <div id="history-list" class="history-container">
    <!-- 历史记录会动态插入这里 -->
  </div>
  
  <!-- 右键菜单 -->
  <div id="context-menu" class="context-menu">
    <div class="menu-item" id="menu-open-newtab">
      <svg viewBox="0 0 24 24">
        <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
      </svg>
      在新标签页打开
    </div>
    <div class="menu-item" id="menu-copy-url">
      <svg viewBox="0 0 24 24">
        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
      </svg>
      复制完整URL
    </div>
    <div class="menu-item" id="menu-copy-title">
      <svg viewBox="0 0 24 24">
        <path d="M4 6h16v2H4zm2-4h12v2H6zm14 8H4v2h16zm-2 4H6v2h12zm2 4H8v2h10z"/>
      </svg>
      复制标题
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="menu-remove">
      <svg viewBox="0 0 24 24">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
      从历史中移除
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
